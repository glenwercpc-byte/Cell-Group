<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2744">
<title>시카고 언약 장로교회 샘터 조직표</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── 리셋 & 변수 ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
:root{
  --navy:#1a2744;--navy2:#243058;
  --hdr:#3a5a8c;
  --hdr-border:rgba(255,255,255,.25);
  --line:#aaa;--line2:#d8d8d8;--bg:#f5f3ee;
  --white:#ffffff;
  --ink:#1a1a1a;--ink2:#444;--ink3:#888;
  --green:#2d6a4f;--green2:#40916c;
  --red:#c0392b;
  --samter-sep:#3a5a8c;
  --font-serif:'Nanum Myeongjo',serif;
  --font-sans:'Noto Sans KR',sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);min-height:100dvh}
button{cursor:pointer;font-family:var(--font-sans);border:none;outline:none}
input{font-family:var(--font-sans);outline:none}
.hidden{display:none!important}



/* ── 앱 ──────────────────────────────────────── */
#app{display:none}



/* ── 메인 ────────────────────────────────────── */
.main{max-width:1100px;margin:0 auto;padding:12px 16px 60px}

/* ── 통합 툴바 ──────────────────────────────── */
.toolbar{
  display:flex;align-items:center;
  background:#fff;border:2px solid var(--navy);border-radius:8px;
  padding:9px 14px;margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  gap:10px;flex-wrap:wrap;
}
/* 왼쪽: 교회명+연도 */
.tb-left{
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.tb-church{
  font-family:var(--font-serif);font-size:.88rem;font-weight:800;
  color:var(--navy);letter-spacing:.03em;white-space:nowrap;
}
.tb-title-fix{
  font-size:.82rem;color:var(--navy);font-weight:600;white-space:nowrap;
}
/* 가운데: 통계 (flex:1 + 센터) */
.tb-stat{
  flex:1;text-align:center;
  font-size:.74rem;color:var(--ink2);font-weight:600;white-space:nowrap;
}
/* 오른쪽: 버튼들 */
.tb-btns{
  display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto;
}
/* 자료제공 드롭다운 */
.export-wrap{position:relative;display:inline-block}
.btn-export{background:#fff;color:var(--navy);padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600;border:1.5px solid var(--navy);cursor:pointer}
.btn-export:hover{background:#f0f3f8}
.export-box{
  position:absolute;top:calc(100% + 6px);right:0;
  background:#fff;border:1.5px solid var(--navy);border-radius:8px;
  overflow:hidden;z-index:500;min-width:140px;
  box-shadow:0 8px 22px rgba(0,0,0,.14);
}
.export-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;font-size:.78rem;font-weight:500;color:var(--ink);
  cursor:pointer;transition:background .12s;border-bottom:.5px solid var(--line2);
}
.export-item:last-child{border-bottom:none}
.export-item:hover{background:#f0f3f8}
.export-item .ei-icon{font-size:1rem}

/* ── 연도 버튼 & 패널 ───────────────────────── */
.year-wrap{position:relative;display:inline-block}
.year-btn{
  background:var(--navy);color:#fff;border:none;
  padding:5px 10px 5px 12px;font-size:.92rem;font-weight:700;
  cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:4px;
  font-family:var(--font-sans);transition:background .15s;
}
.year-btn:hover{background:var(--navy2)}
.year-btn .arr{font-size:.56rem;opacity:.8}

.year-panel{
  position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#fff;border:1.5px solid var(--navy);border-radius:10px;
  z-index:999;min-width:210px;
  box-shadow:0 10px 28px rgba(0,0,0,.18);overflow:hidden;
}
.yp-head{background:var(--navy);color:#fff;font-size:.71rem;font-weight:600;padding:8px 14px;text-align:center;letter-spacing:.06em}
.yp-current{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#eaf0fb;border-bottom:1px solid var(--line2);cursor:pointer;transition:background .12s}
.yp-current:hover{background:#dce7f7}
.yp-current .yn{font-size:.88rem;font-weight:700;color:var(--navy)}
.yp-current .yb-cur{font-size:.68rem;padding:2px 8px;border-radius:10px;background:#d4edda;color:#155724;font-weight:600}
.yp-saved{border-top:1px solid var(--line2)}
.yp-saved-head{font-size:.69rem;color:var(--ink3);font-weight:600;padding:6px 16px 3px;letter-spacing:.05em}
.yp-saved-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;border-bottom:.5px solid var(--line2);transition:background .12s}
.yp-saved-item:last-child{border-bottom:none}
.yp-saved-item:hover{background:#f0f3f8}
.yp-saved-item .yn{font-size:.85rem;font-weight:600;color:var(--navy)}
.yp-saved-item .yb-saved{font-size:.67rem;padding:2px 7px;border-radius:9px;background:#fff3cd;color:#856404;font-weight:600}
.yp-new{padding:12px 16px}
.yp-new label{display:block;font-size:.72rem;font-weight:600;color:var(--ink3);margin-bottom:6px}
.yp-new input{
  width:100%;border:1.5px solid var(--line2);border-radius:5px;
  padding:7px 10px;font-size:.88rem;text-align:center;transition:border-color .2s;
}
.yp-new input:focus{border-color:var(--navy)}
.yp-err{font-size:.7rem;color:var(--red);margin-top:4px;min-height:14px}
.yp-new-btns{display:flex;gap:6px;margin-top:8px}
.yp-new-btns button{flex:1;padding:7px;border-radius:5px;font-size:.74rem;font-weight:600}
.ypb-cancel{background:#f0f0f0;color:#555}.ypb-cancel:hover{background:#e0e0e0}
.ypb-ok{background:var(--navy);color:#fff}.ypb-ok:hover{background:var(--navy2)}

/* ── 연도 전환 모달 ─────────────────────────── */
.modal-bd{
  min-height:260px;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;margin:12px 0;padding:20px;
}
.modal-box{background:#fff;border-radius:12px;padding:26px 22px 20px;width:100%;max-width:330px}
.modal-title{font-family:var(--font-serif);font-size:.98rem;color:var(--navy);font-weight:800;margin-bottom:5px}
.modal-sub{font-size:.74rem;color:var(--ink3);margin-bottom:16px;line-height:1.5}
.modal-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.modal-opt{
  border:1.5px solid var(--line2);border-radius:8px;padding:11px 13px;
  cursor:pointer;transition:border-color .15s,background .15s;
  text-align:left;background:#fff;width:100%;
}
.modal-opt:hover{border-color:var(--navy);background:#f0f3f8}
.modal-opt.sel{border-color:var(--navy);background:#eaf0fb}
.opt-t{font-size:.83rem;font-weight:700;color:var(--navy);margin-bottom:2px}
.opt-d{font-size:.71rem;color:var(--ink3);line-height:1.4}
.modal-btns{display:flex;gap:7px}
.modal-btns button{flex:1;padding:9px;border-radius:7px;font-size:.78rem;font-weight:600}
.mb-cancel{background:#f0f0f0;color:#555}
.mb-ok{background:var(--navy);color:#fff}
.mb-ok:disabled{background:#ccc;cursor:default}



.btn-dist{background:var(--navy);color:#fff;padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600;border:none}
.btn-dist:hover{background:var(--navy2)}

/* 샘터 추가 드롭다운 */
.dp-wrap{position:relative;display:inline-block}
.btn-samt{background:#fff;color:var(--navy);padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600;border:1.5px solid var(--navy)}
.btn-samt:hover{background:#f0f3f8}
.dp-box{
  position:absolute;top:calc(100% + 6px);right:0;
  background:#fff;border:1.5px solid var(--navy);border-radius:8px;
  padding:13px 14px;z-index:500;width:210px;
  box-shadow:0 8px 22px rgba(0,0,0,.14);
}
.dp-box label{font-size:.72rem;font-weight:600;color:var(--ink2);display:block;margin-bottom:5px}
.dp-box input{
  width:100%;border:1.5px solid var(--line2);border-radius:5px;
  padding:7px 10px;font-size:.88rem;text-align:center;transition:border-color .2s;
}
.dp-box input:focus{border-color:var(--navy)}
.dp-hint{font-size:.67rem;color:var(--ink3);margin-top:4px;line-height:1.4}
.dp-err{font-size:.69rem;color:var(--red);margin-top:3px;min-height:13px}
.dp-btns{display:flex;gap:6px;margin-top:9px}
.dp-btns button{flex:1;padding:6px;border-radius:5px;font-size:.73rem;font-weight:600}
.db-ok{background:var(--navy);color:#fff}
.db-cancel{background:#f0f0f0;color:#555}

.btn-save-ctrl{background:var(--green);color:#fff;padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600;border:none}
.btn-save-ctrl:hover{background:var(--green2)}




/* ── 조직표 테이블 ─────────────────────────── */
.org-wrap{
  background:#fff;border:2.5px solid var(--navy);
  border-radius:4px;overflow:hidden;
  box-shadow:0 3px 14px rgba(0,0,0,.1);
}
table{width:100%;border-collapse:collapse;font-size:.78rem}

/* 지구 헤더행 */
.r-dh td{
  background:var(--hdr);color:#fff;
  font-weight:700;font-size:.77rem;padding:8px 10px;
  border:1px solid var(--hdr-border);
}

/* 샘터 데이터행 */
.r-s td{border:1px solid var(--line2);padding:0;vertical-align:middle}

/* 샘터 번호 칸 */
.cn{
  background:#e8eef7;width:44px;min-width:44px;text-align:center;
  font-weight:700;color:var(--navy);
  border-right:2.5px solid var(--samter-sep)!important;
}

/* 청지기 칸 */
.ck{
  width:94px;min-width:94px;background:#f2f5fa;text-align:center;
  font-size:.74rem;color:var(--ink2);font-weight:500;
  border-right:2.5px solid var(--samter-sep)!important;
  padding:4px 3px;line-height:1.4;
}
.ck-count{font-size:.68rem;color:var(--hdr);font-weight:700;margin-top:2px}

/* 멤버 칸 */
.cm{padding:0}
.mg{display:grid;grid-template-columns:repeat(10,1fr);width:100%}
.mc{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);min-height:28px;display:flex;align-items:center}
.mc:nth-child(10n){border-right:none}
.mc input{
  width:100%;height:100%;min-height:28px;border:none;background:transparent;
  padding:2px 4px;font-size:.75rem;color:var(--ink);
}
.mc input:focus{background:#fffde8;outline:none}
.mc input::placeholder{color:#ccc;font-size:.65rem}

/* 샘터 사이 구분선 */
.r-sep td{
  height:0;padding:0;border:none;
  border-top:2.5px solid var(--samter-sep);
  background:var(--bg);
}
/* 지구 사이 구분선 */
.r-dist-sep td{
  height:10px;background:var(--bg);
  border:none;border-top:4px solid var(--navy);
}

.empty-d td{
  text-align:center;padding:12px;color:var(--ink3);
  font-size:.73rem;border:1px dashed var(--line2);
}

/* ── 토스트 ──────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--navy);color:#fff;
  padding:8px 20px;border-radius:20px;
  font-size:.8rem;font-weight:500;
  opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;
  z-index:9999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green)}
#toast.err{background:var(--red)}

/* ── 반응형 ──────────────────────────────────── */
@media(max-width:900px){
  .mg{grid-template-columns:repeat(5,1fr)}
  .mc:nth-child(10n){border-right:1px solid var(--line2)}
  .mc:nth-child(5n){border-right:none}
}
@media(max-width:700px){
  .toolbar{flex-wrap:wrap;gap:8px}
  .tb-stat{margin-left:0;width:100%;text-align:right}
  .main{padding:10px 8px 40px}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;
              background:linear-gradient(160deg,#1a2744 0%,#2d6a4f 100%);padding:20px">
    <div style="background:#fff;border-radius:16px;padding:44px 38px 38px;
                width:100%;max-width:340px;text-align:center;
                box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:2.2rem;margin-bottom:8px">🌿</div>
      <h1 style="font-family:'Nanum Myeongjo',serif;font-size:1.3rem;color:#1a2744;
                 font-weight:800;margin-bottom:4px">시카고 언약 장로교회</h1>
      <p style="font-size:.78rem;color:#888;margin-bottom:28px;letter-spacing:.04em">샘터 조직 관리 시스템</p>
      <input type="password" id="pw" placeholder="비밀번호 입력"
             onkeydown="if(event.key==='Enter')handleLogin()"
             style="width:100%;padding:12px 14px;border:2px solid #e8e8e8;border-radius:8px;
                    font-size:.95rem;margin-bottom:14px;font-family:inherit;outline:none;
                    box-sizing:border-box;transition:border-color .2s"
             onfocus="this.style.borderColor='#1a2744'"
             onblur="this.style.borderColor='#e8e8e8'">
      <button onclick="handleLogin()"
        style="width:100%;padding:13px;background:#1a2744;color:#fff;border:none;
               border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;
               font-family:inherit;transition:background .2s"
        onmouseover="this.style.background='#243058'"
        onmouseout="this.style.background='#1a2744'">로그인</button>
      <p id="lerr" style="color:#c0392b;font-size:.8rem;margin-top:10px;min-height:20px"></p>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="app">


  <main class="main">

    <!-- 연도 전환 모달 -->
    <div id="modal-area"></div>

    <!-- 통합 툴바: 교회명+연도 | 버튼들 | 통계 -->
    <div class="toolbar">

      <!-- 왼쪽: 교회명 + 연도 선택 -->
      <div class="tb-left">
        <div class="tb-church">시카고 언약 장로교회</div>
        <div class="year-wrap" id="yw">
          <button class="year-btn" onclick="toggleYP()">
            <span id="yd">2026</span>년
            <span class="arr">▼</span>
          </button>
          <div class="year-panel hidden" id="yp">
            <div class="yp-head">조직표 연도 선택</div>
            <div class="yp-current" onclick="selectYear(currentYear)">
              <span class="yn" id="yp-cur-num">2026</span>
              <span class="yb-cur">현재</span>
            </div>
            <div class="yp-saved hidden" id="yp-saved">
              <div class="yp-saved-head">저장된 연도</div>
              <div id="yp-saved-list"></div>
            </div>
            <div class="yp-new">
              <label>새 연도 직접 입력</label>
              <input type="number" id="new-year-inp" placeholder="예) 2027"
                     min="2024" max="2099"
                     onkeydown="if(event.key==='Enter')submitNewYear()">
              <div class="yp-err" id="yp-err"></div>
              <div class="yp-new-btns">
                <button class="ypb-cancel" onclick="closeYP()">취소</button>
                <button class="ypb-ok" onclick="submitNewYear()">이동</button>
              </div>
            </div>
          </div>
        </div>
        <span class="tb-title-fix">샘터 조직표</span>
      </div>

      <!-- 가운데: 통계 -->
      <div class="tb-stat" id="stat"></div>

      <!-- 오른쪽: 버튼들 -->
      <div class="tb-btns">
        <button class="btn-dist" onclick="addDistrict()">＋ 지구 추가</button>
        <div class="dp-wrap" id="dpw">
          <button class="btn-samt" onclick="toggleDp()">＋ 샘터 추가</button>
          <div class="dp-box hidden" id="dpb">
            <label>샘터 번호 입력</label>
            <input type="text" id="si" placeholder="예) 14" maxlength="3"
                   oninput="document.getElementById('dp-err').textContent=''"
                   onkeydown="if(event.key==='Enter')doAddSamter()">
            <div class="dp-hint">앞자리=지구, 뒷자리=순번<br>예) 14 → 1지구 4번째 샘터</div>
            <div class="dp-err" id="dp-err"></div>
            <div class="dp-btns">
              <button class="db-cancel" onclick="closeDp()">취소</button>
              <button class="db-ok" onclick="doAddSamter()">추가</button>
            </div>
          </div>
        </div>
        <button class="btn-save-ctrl" onclick="saveOrg()">전체 저장</button>
        <div class="export-wrap" id="expw">
          <button class="btn-export" onclick="toggleExport()">자료제공 ▾</button>
          <div class="export-box hidden" id="expb">
            <div class="export-item" onclick="doExport('gdocs')">
              <span class="ei-icon">📄</span> 조직표 출력
            </div>
            <div class="export-item" onclick="doExport('monthly')">
              <span class="ei-icon">📋</span> 월 샘터보고서
            </div>
            <div class="export-item" onclick="doExport('yearly')">
              <span class="ei-icon">📅</span> 년중 출석 상황
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="org-wrap">
      <table><tbody id="tbody"></tbody></table>
    </div>

  </main>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
