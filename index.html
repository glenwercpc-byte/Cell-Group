<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시카고 언약 장로교회 샘터 조직표</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--hdr:#3a5a8c;--hdr-b:rgba(255,255,255,.25);
  --line2:#d8d8d8;--bg:#f5f3ee;--ink:#1a1a1a;--ink2:#444;--ink3:#888;
  --green:#2d6a4f;--sep:#3a5a8c;
  --serif:'Nanum Myeongjo',serif;--sans:'Noto Sans KR',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none;outline:none}
input{font-family:var(--sans);outline:none}
.hidden{display:none!important}

/* ── 메인 ── */
.main{max-width:1100px;margin:0 auto;padding:12px 16px 60px}

/* ── 툴바 ── */
.toolbar{display:flex;align-items:center;background:#fff;border:2px solid var(--navy);
  border-radius:8px;padding:9px 14px;margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);gap:10px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-church{font-family:var(--serif);font-size:.88rem;font-weight:800;color:var(--navy);
  letter-spacing:.03em;white-space:nowrap}
.tb-title-fix{font-size:.82rem;color:var(--navy);font-weight:600;white-space:nowrap}
.tb-stat{flex:1;text-align:center;font-size:.74rem;color:var(--ink2);font-weight:600;white-space:nowrap}
.tb-btns{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto}

/* ── 연도 버튼 ── */
.year-wrap{position:relative}
.year-btn{background:var(--navy);color:#fff;padding:5px 10px 5px 12px;
  border-radius:5px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:4px}
.arr{font-size:.7rem;opacity:.8}
.year-panel{position:absolute;top:calc(100% + 8px);left:0;background:#fff;
  border:1.5px solid var(--navy);border-radius:10px;padding:14px;
  min-width:220px;z-index:600;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.yp-head{font-size:.72rem;color:var(--ink3);margin-bottom:10px;font-weight:600}
.yp-current{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:#f0f3f8;border-radius:6px;cursor:pointer;margin-bottom:8px}
.yn{font-weight:700;color:var(--navy)}
.yb-cur{font-size:.68rem;background:var(--navy);color:#fff;padding:2px 7px;border-radius:10px}
.yb-saved{font-size:.68rem;background:#eee;color:#555;padding:2px 7px;border-radius:10px}
.yp-saved-head{font-size:.68rem;color:var(--ink3);padding:4px 0 6px;font-weight:600}
.yp-saved-item{display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;border-radius:5px;cursor:pointer;margin-bottom:2px}
.yp-saved-item:hover{background:#f5f5f5}
.yp-new{border-top:1px solid var(--line2);margin-top:10px;padding-top:10px}
.yp-new label{font-size:.72rem;color:var(--ink3);display:block;margin-bottom:6px}
.yp-new input{width:100%;padding:8px 10px;border:1.5px solid var(--line2);border-radius:6px;font-size:.85rem}
.yp-err{font-size:.7rem;color:#c0392b;min-height:16px;margin-top:4px}
.yp-new-btns{display:flex;gap:6px;margin-top:8px}
.ypb-cancel{flex:1;padding:7px;background:#f0f0f0;color:#555;border-radius:5px;font-size:.76rem}
.ypb-ok{flex:1;padding:7px;background:var(--navy);color:#fff;border-radius:5px;font-size:.76rem;font-weight:600}

/* ── 버튼들 ── */
.btn-dist{background:var(--navy);color:#fff;padding:6px 12px;border-radius:5px;font-size:.73rem;font-weight:600}
.btn-samt{background:#fff;color:var(--navy);border:1.5px solid var(--navy);padding:6px 12px;border-radius:5px;font-size:.73rem;font-weight:600}
.btn-save-ctrl{background:var(--green);color:#fff;padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600}
.btn-export{background:#fff;color:var(--navy);padding:6px 13px;border-radius:5px;font-size:.73rem;font-weight:600;border:1.5px solid var(--navy)}

/* ── 샘터 추가 드롭다운 ── */
.dp-wrap{position:relative}
.dp-box{position:absolute;top:calc(100% + 8px);right:0;background:#fff;
  border:1.5px solid var(--navy);border-radius:10px;padding:14px;
  min-width:200px;z-index:600;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.dp-box label{font-size:.72rem;color:var(--ink3);display:block;margin-bottom:6px;font-weight:600}
.dp-box input{width:100%;padding:8px 10px;border:1.5px solid var(--line2);border-radius:6px;font-size:.9rem}
.dp-hint{font-size:.68rem;color:var(--ink3);margin-top:5px;line-height:1.5}
.dp-err{font-size:.7rem;color:#c0392b;min-height:16px;margin-top:4px}
.dp-btns{display:flex;gap:6px;margin-top:8px}
.db-cancel{flex:1;padding:7px;background:#f0f0f0;color:#555;border-radius:5px;font-size:.76rem}
.db-ok{flex:1;padding:7px;background:var(--navy);color:#fff;border-radius:5px;font-size:.76rem;font-weight:600}

/* ── 자료제공 드롭다운 ── */
.export-wrap{position:relative;display:inline-block}
.export-box{position:absolute;top:calc(100% + 6px);right:0;background:#fff;
  border:1.5px solid var(--navy);border-radius:8px;overflow:hidden;
  z-index:500;min-width:150px;box-shadow:0 8px 22px rgba(0,0,0,.14)}
.export-item{display:flex;align-items:center;gap:8px;padding:10px 14px;
  font-size:.78rem;font-weight:500;color:var(--ink);cursor:pointer;
  border-bottom:.5px solid var(--line2)}
.export-item:last-child{border-bottom:none}
.export-item:hover{background:#f0f3f8}
.ei-icon{font-size:1rem}

/* ── 조직표 테이블 ── */
.org-wrap{background:#fff;border:2.5px solid var(--navy);border-radius:3px;
  overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse}
.r-dh td{background:var(--hdr);color:#fff;font-weight:700;font-size:.77rem;
  padding:8px 10px;border:1px solid var(--hdr-b)}
.r-s td{border:1px solid var(--line2);padding:0;vertical-align:middle}
.cn{background:#e8eef7;width:44px;min-width:44px;text-align:center;
  font-weight:700;color:var(--navy);border-right:2.5px solid var(--sep)!important}
.ck{width:100px;min-width:100px;background:#f2f5fa;text-align:center;
  font-size:.76rem;color:var(--ink2);font-weight:500;
  border-right:2.5px solid var(--sep)!important;padding:4px 3px;line-height:1.5}
.ck-count{font-size:.69rem;color:var(--hdr);font-weight:700;margin-top:2px}
.cm{padding:0}
.mg{display:grid;grid-template-columns:repeat(10,1fr);width:100%}
.mc{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);
  min-height:28px;display:flex;align-items:center}
.mc:nth-child(10n){border-right:none}
.mc input{width:100%;height:100%;min-height:28px;border:none;background:transparent;
  padding:2px 5px;font-size:.8rem;color:var(--ink)}
.mc input:focus{background:#fffde8}
.mc input::placeholder{color:#ccc;font-size:.68rem}
.r-sep td{height:0;padding:0;border:none;border-top:2.5px solid var(--sep);background:var(--bg)}
.r-dist-sep td{height:10px;background:var(--bg);border:none;border-top:4px solid var(--navy)}
.empty-d{padding:16px;text-align:center;font-size:.78rem;color:var(--ink3)}

/* ── 연도 전환 모달 ── */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:7000;padding:20px}
.modal-box{background:#fff;border-radius:14px;padding:28px 24px 22px;
  width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-family:var(--serif);font-size:1rem;color:var(--navy);font-weight:800;margin-bottom:4px}
.modal-sub{font-size:.78rem;color:var(--ink3);margin-bottom:18px;line-height:1.6}
.modal-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.modal-opt{text-align:left;padding:13px 16px;border:2px solid var(--line2);border-radius:8px;background:#fff}
.modal-opt:hover{border-color:var(--navy)}
.modal-opt.sel{border-color:var(--navy);background:#f0f3f8}
.opt-t{font-size:.83rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.opt-d{font-size:.74rem;color:var(--ink3);line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.mb-cancel{padding:9px 18px;background:#f0f0f0;color:#555;border-radius:6px;font-size:.8rem}
.mb-ok{padding:9px 18px;background:var(--navy);color:#fff;border-radius:6px;font-size:.8rem;font-weight:600}
.mb-ok:disabled{opacity:.4;cursor:not-allowed}

/* ── 토스트 ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2744;color:#fff;padding:9px 20px;border-radius:24px;
  font-size:.78rem;font-weight:500;opacity:0;transition:all .3s;
  pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:#c0392b}

/* ── 반응형 ── */
@media(max-width:900px){
  .mg{grid-template-columns:repeat(5,1fr)}
  .mc:nth-child(10n){border-right:1px solid var(--line2)}
  .mc:nth-child(5n){border-right:none}
}
@media(max-width:700px){
  .toolbar{flex-wrap:wrap;gap:8px}
  .tb-stat{margin-left:0;width:100%;text-align:right}
  .main{padding:10px 8px 40px}
}
</style>
</head>
<body>

<div class="main">
  <div id="modal-area"></div>

  <!-- 툴바 -->
  <div class="toolbar">
    <div class="tb-left">
      <div class="tb-church">시카고 언약 장로교회</div>
      <div class="year-wrap" id="yw">
        <button class="year-btn" onclick="toggleYP()">
          <span id="yd">2026</span>년<span class="arr">▼</span>
        </button>
        <div class="year-panel hidden" id="yp">
          <div class="yp-head">조직표 연도 선택</div>
          <div class="yp-current" onclick="selectYear(currentYear)">
            <span class="yn" id="yp-cur-num">2026</span>
            <span class="yb-cur">현재</span>
          </div>
          <div class="yp-saved hidden" id="yp-saved">
            <div class="yp-saved-head">저장된 연도</div>
            <div id="yp-saved-list"></div>
          </div>
          <div class="yp-new">
            <label>새 연도 직접 입력</label>
            <input type="number" id="new-year-inp" placeholder="예) 2027"
                   min="2024" max="2099"
                   onkeydown="if(event.key==='Enter')submitNewYear()">
            <div class="yp-err" id="yp-err"></div>
            <div class="yp-new-btns">
              <button class="ypb-cancel" onclick="closeYP()">취소</button>
              <button class="ypb-ok" onclick="submitNewYear()">이동</button>
            </div>
          </div>
        </div>
      </div>
      <span class="tb-title-fix">샘터 조직표</span>
    </div>

    <div class="tb-stat" id="stat"></div>

    <div class="tb-btns">
      <button class="btn-dist" onclick="addDistrict()">＋ 지구 추가</button>
      <div class="dp-wrap" id="dpw">
        <button class="btn-samt" onclick="toggleDp()">＋ 샘터 추가</button>
        <div class="dp-box hidden" id="dpb">
          <label>샘터 번호 입력</label>
          <input type="text" id="si" placeholder="예) 14" maxlength="3"
                 oninput="document.getElementById('dp-err').textContent=''"
                 onkeydown="if(event.key==='Enter')doAddSamter()">
          <div class="dp-hint">앞자리=지구, 뒷자리=순번</div>
          <div class="dp-err" id="dp-err"></div>
          <div class="dp-btns">
            <button class="db-cancel" onclick="closeDp()">취소</button>
            <button class="db-ok" onclick="doAddSamter()">추가</button>
          </div>
        </div>
      </div>
      <button class="btn-save-ctrl" onclick="saveOrg()">전체 저장</button>
      <div class="export-wrap" id="expw">
        <button class="btn-export" onclick="toggleExport()">자료제공 ▾</button>
        <div class="export-box hidden" id="expb">
          <div class="export-item" onclick="doExport('gdocs')">
            <span class="ei-icon">📄</span> 조직표 출력
          </div>
          <div class="export-item" onclick="doExport('monthly')">
            <span class="ei-icon">📋</span> 월 샘터보고서
          </div>
          <div class="export-item" onclick="doExport('monthlyAll')">
            <span class="ei-icon">📊</span> 월 전체 보고서
          </div>
          <div class="export-item" onclick="doExport('yearly')">
            <span class="ei-icon">📅</span> 년중 출석 상황
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="org-wrap">
    <table><tbody id="tbody"></tbody></table>
  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
